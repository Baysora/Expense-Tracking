name: Deploy to Azure Static Web Apps

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Build shared first and produce a tarball so the API can install it
      # without relying on workspace symlinks (which break in Oryx/zip contexts)
      - name: Build and pack shared package
        working-directory: packages/shared
        run: |
          npm install
          npm run build
          npm pack --pack-destination ../../api/

      # Install workspace deps — npm ci pins exact versions from the lock file
      - name: Install workspace dependencies
        run: npm ci

      # Compile the API TypeScript using workspace-resolved types
      # api/dist/ is uploaded to SWA along with the source
      - name: Build API
        working-directory: api
        run: |
          npx prisma generate
          npx tsc

      - name: Build frontend
        run: npm run build --workspace=frontend
        env:
          VITE_ENTRA_TENANT_NAME: ${{ secrets.ENTRA_TENANT_NAME }}
          VITE_ENTRA_CLIENT_ID: ${{ secrets.ENTRA_CLIENT_ID }}
          VITE_API_SCOPE: ${{ secrets.ENTRA_API_SCOPE }}
          VITE_DEV_MODE: 'false'

      # Oryx's npm install can't handle file: tarball deps (resolves path relative
      # to its own working dir, and npm 10 deletes "null-integrity" tarballs on retry).
      # Pre-populate api/node_modules/ in an isolated context so skip_api_build:true
      # tells Oryx to deploy the folder as-is. Azure Functions runtime is detected
      # from host.json + package.json, not from Oryx.
      - name: Install API production dependencies (isolated)
        run: |
          TMP=$(mktemp -d)
          cp api/package.json "$TMP/"
          cp api/expense-shared-1.0.0.tgz "$TMP/"
          cp -r api/prisma "$TMP/prisma"
          cd "$TMP"
          npm install
          node_modules/.bin/prisma generate --schema=prisma/schema.prisma
          rm -rf prisma
          cp -r node_modules/ $GITHUB_WORKSPACE/api/node_modules/

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: 'frontend/dist'
          api_location: 'api'
          output_location: ''
          skip_app_build: true
          skip_api_build: true
          config_file_location: '.'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          AZURE_STORAGE_CONTAINER_NAME: expense-attachments
          ENTRA_TENANT_NAME: ${{ secrets.ENTRA_TENANT_NAME }}
          ENTRA_AUDIENCE: ${{ secrets.ENTRA_AUDIENCE }}

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: 'close'
