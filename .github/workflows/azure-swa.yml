name: Deploy to Azure Static Web Apps

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install workspace dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build --workspace=packages/shared

      - name: Run Prisma generate
        run: npx prisma generate
        working-directory: api

      - name: Build frontend
        run: npm run build --workspace=frontend
        env:
          VITE_B2C_TENANT_NAME: ${{ secrets.B2C_TENANT_NAME }}
          VITE_B2C_POLICY_NAME: ${{ secrets.B2C_POLICY_NAME }}
          VITE_B2C_CLIENT_ID: ${{ secrets.B2C_CLIENT_ID }}
          VITE_API_SCOPE: ${{ secrets.B2C_API_SCOPE }}
          VITE_DEV_MODE: 'false'

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: 'frontend'
          api_location: 'api'
          output_location: 'dist'
          skip_app_build: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          AZURE_STORAGE_CONTAINER_NAME: expense-attachments
          B2C_TENANT_NAME: ${{ secrets.B2C_TENANT_NAME }}
          B2C_POLICY_NAME: ${{ secrets.B2C_POLICY_NAME }}
          B2C_CLIENT_ID: ${{ secrets.B2C_CLIENT_ID }}
          B2C_AUDIENCE: ${{ secrets.B2C_AUDIENCE }}

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: 'close'
